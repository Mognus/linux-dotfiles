# =============================================================================
# HYPRLAND CONFIG — minimal
# =============================================================================

# --- Monitor ---
monitor=HDMI-A-1,1920x1080@144,0x0,1

# --- Autostart ---
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = sleep 2 && hyprctl hyprpaper wallpaper "HDMI-A-1,/home/magnus/Pictures/Wallpapers/Hatsune-Miku-Wallpaper.jpg"
exec-once = [workspace 5 silent] alacritty

# --- Input ---
input {
    kb_layout = us
    # kb_options = lv3:ralt_switch,umlaut:on
    # Note: custom umlaut xkb file must be installed via keyboard-config repo
    follow_mouse = 1
    sensitivity = 0
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgb(89dceb)
    col.inactive_border = rgb(313244)
    layout = dwindle
}

# --- Appearance ---
decoration {
    rounding = 4
    blur {
        enabled = true
        size = 3
        passes = 1
        noise = 0.05
    }
}

animations {
    enabled = true

    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear,  0.0,  0.0, 1.0, 1.0

    animation = windows,       1, 4,  easeOut, slide
    animation = windowsOut,    1, 3,  linear,  slide
    animation = fade,          1, 4,  linear
    animation = workspaces,    1, 4,  easeOut, slidevert
}

# --- Layout ---
dwindle {
    pseudotile = false
    preserve_split = true
}

# =============================================================================
# KEYBINDS
# =============================================================================

$mod = SUPER

# Terminal
bind = $mod, Return, exec, alacritty

# Browser
bind = $mod, B, exec, firefox

# Launcher (rofi)
bind = $mod, Space, exec, rofi -show drun

# Lock screen
bind = $mod, L, exec, hyprlock

# Sleep
bind = $mod, F1, exec, systemctl suspend

# Screenshots
bind = $mod, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%F_%T).png
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Close window
bind = $mod, Q, killactive

# Fullscreen
bind = $mod, F, fullscreen

# Float toggle
bind = $mod SHIFT, Space, togglefloating

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# =============================================================================
# WORKSPACES
# =============================================================================

# Persistent workspaces
workspace = 1, defaultName:code,  persistent:true
workspace = 2, defaultName:test,  persistent:true
workspace = 3, defaultName:flow,  persistent:true
workspace = 4, defaultName:voice, persistent:true
workspace = 5, defaultName:ai,    persistent:true
workspace = 6, defaultName:term,  persistent:true

# Cycle workspaces
bind = $mod, left,  workspace, e-1
bind = $mod, right, workspace, e+1

# Switch by number
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

# Switch by shortcut (coding=1, test=2, flow=3, voice=4, ai=5, term=6)
bind = $mod SHIFT, c, workspace, 1
bind = $mod SHIFT, q, workspace, 2
bind = $mod SHIFT, f, workspace, 3
bind = $mod SHIFT, v, workspace, 4
bind = $mod SHIFT, a, workspace, 5
bind = $mod SHIFT, t, workspace, 6

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
