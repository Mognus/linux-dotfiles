# =============================================================================
# HYPRLAND CONFIG — minimal
# =============================================================================

# --- Monitor ---
monitor=HDMI-A-1,1920x1080@144,0x0,1

# --- Autostart ---
exec-once = pactl set-default-source alsa_input.usb-Kingston_HyperX_7.1_Audio_00000000-00.analog-stereo
exec-once = waybar
exec-once = ~/.config/waybar/scripts/scratchpad-listener.sh
exec-once = dunst
exec-once = hyprpaper
exec-once = sleep 2 && hyprctl hyprpaper wallpaper "HDMI-A-1,/home/magnus/Pictures/Wallpapers/Hatsune-Miku-Wallpaper.jpg"
exec-once = [workspace 5 silent] alacritty

# --- Input ---
input {
    kb_layout = us
    # kb_options = lv3:ralt_switch,umlaut:on
    # Note: custom umlaut xkb file must be installed via keyboard-config repo
    follow_mouse = 1
    sensitivity = 0
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgb(89dceb)
    col.inactive_border = rgb(313244)
    layout = dwindle
}

# --- Appearance ---
decoration {
    rounding = 10
    dim_around = 0.8
    blur {
        enabled = true
        size = 3
        passes = 1
        noise = 0.05
    }
}

animations {
    enabled = true

    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear,  0.0,  0.0, 1.0, 1.0

    animation = windows,       1, 4,  easeOut, slide
    animation = windowsOut,    1, 3,  linear,  slide
    animation = fade,          1, 4,  linear
    animation = workspaces,       1, 4,  easeOut, slide
    animation = specialWorkspace, 1, 4,  easeOut, slidevert
}

# --- Layout ---
dwindle {
    pseudotile = false
    preserve_split = true
}

# =============================================================================
# KEYBINDS
# =============================================================================

$mod = SUPER

# Terminal
bind = $mod, Return, exec, alacritty

# Browser
bind = $mod, B, exec, firefox

# Firefox Scratchpad (Special Workspace)
bind = $mod CTRL, B, togglespecialworkspace, firefox

# Discord Scratchpad (Special Workspace)
bind = $mod CTRL, D, togglespecialworkspace, discord

# Launcher (rofi)
bind = $mod, Space, exec, rofi -show drun

# Lock screen
bind = $mod, L, exec, hyprlock

# Sleep
bind = $mod, F1, exec, systemctl suspend

# Screenshots
bind = $mod, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%F_%T).png
bind = $mod CTRL, S, exec, grim -g "$(slurp)" - | wl-copy

# Close window
bind = $mod, Q, killactive

# Fullscreen
bind = $mod, F, fullscreen

# Float toggle
bind = $mod CTRL, Space, togglefloating

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move window
bind = $mod CTRL, h, movewindow, l
bind = $mod CTRL, l, movewindow, r
bind = $mod CTRL, k, movewindow, u
bind = $mod CTRL, j, movewindow, d

# =============================================================================
# WORKSPACES
# =============================================================================

# Persistent workspaces
workspace = 1, defaultName:code,  persistent:true
workspace = 2, defaultName:test,  persistent:true
workspace = 3, defaultName:flow,  persistent:true
workspace = 4, defaultName:ai,    persistent:true
workspace = 5, defaultName:term,  persistent:true
workspace = special:firefox, on-created-empty:firefox, gapsout:60
workspace = special:discord, on-created-empty:discord, gapsout:60

windowrule = dim_around on, match:class ^(firefox)$, match:workspace special:firefox
windowrule = dim_around on, match:class ^(discord)$, match:workspace special:discord


# Cycle workspaces
bind = $mod, left,  workspace, e-1
bind = $mod, right, workspace, e+1

# Switch by number
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Switch by shortcut (code=1, test=2, flow=3, ai=4, term=5)
bind = $mod CTRL, c, workspace, 1
bind = $mod CTRL, q, workspace, 2
bind = $mod CTRL, f, workspace, 3
bind = $mod CTRL, a, workspace, 4
bind = $mod CTRL, t, workspace, 5

# Move window to workspace
bind = $mod CTRL, 1, movetoworkspace, 1
bind = $mod CTRL, 2, movetoworkspace, 2
bind = $mod CTRL, 3, movetoworkspace, 3
bind = $mod CTRL, 4, movetoworkspace, 4
bind = $mod CTRL, 5, movetoworkspace, 5
