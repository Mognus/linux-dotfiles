# =============================================================================
# HYPRLAND CONFIG — minimal
# =============================================================================

source = ~/.config/theme/active

# --- Monitor ---
monitor=DP-3,1920x1080@144,0x0,1
monitor=HDMI-A-1,preferred,auto,1,mirror,DP-3

# --- Environment ---
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# --- Autostart ---
# CHANGE: replace with your microphone device (run: pactl list sources short)
exec-once = pactl set-default-source alsa_input.usb-Kingston_HyperX_7.1_Audio_00000000-00.analog-stereo
exec-once = waybar
exec-once = ~/.config/waybar/scripts/scratchpad-listener.sh
exec-once = dunst
exec-once = hyprpaper
# CHANGE: replace /home/magnus with your home directory
exec-once = sleep 2 && hyprctl hyprpaper wallpaper "DP-3,/home/magnus/.config/wallpapers/Tank-Girl-Wallpaper-Black.png"
exec-once = [workspace special:term silent] alacritty
exec-once = eww open tux-angel

bind = CTRL SUPER SHIFT, T, exec, ~/.config/eww/scripts/tux-toggle.sh

# --- Input ---
input {
    kb_layout = us
    # kb_options = lv3:ralt_switch,umlaut:on
    # Note: custom umlaut xkb file must be installed via keyboard-config repo
    follow_mouse = 1
    sensitivity = 0
}

# --- General ---
general {
    gaps_in = 8
    gaps_out = 24 
    border_size = 1
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
}

# --- Appearance ---
decoration {
    rounding = 3
    dim_special = 0.7
    blur {
        enabled = true
        size = 3
        passes = 1
        noise = 0.05
    }
}

animations {
    enabled = true

    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear,  0.0,  0.0, 1.0, 1.0

    animation = windows,       1, 4,  easeOut, slide
    animation = windowsOut,    1, 3,  linear,  slide
    animation = fade,          1, 4,  linear
    animation = workspaces,       1, 4,  easeOut, slide
    animation = specialWorkspace, 1, 4, easeOut, slidevert
}

# --- Layout ---
dwindle {
    pseudotile = false
    preserve_split = true
}

# =============================================================================
# KEYBINDS
# =============================================================================

$mod = SUPER

# Terminal
bind = $mod, Return, exec, alacritty

# Browser
bind = $mod, B, exec, firefox
bind = $mod, T, exec, tor-browser

# Firefox Scratchpad (Special Workspace)
bind = $mod CTRL, B, togglespecialworkspace, firefox

# Discord Scratchpad (Special Workspace)
bind = $mod CTRL, D, togglespecialworkspace, discord

# Notes Scratchpad (Special Workspace)
bind = $mod CTRL, N, togglespecialworkspace, notes

# Music (Submap: M = YT Music, L = Local)
bind = $mod CTRL, M, submap, music
submap = music
bind = , M, togglespecialworkspace, music
bind = , L, togglespecialworkspace, cmus
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

# Launcher (rofi)
bind = $mod, Space, exec, rofi -show drun

# Lock screen
bind = $mod, Escape, exec, hyprlock

# Sleep
bind = $mod, F1, exec, systemctl suspend

# Screenshots
bind = $mod, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%F_%T).png
bind = $mod CTRL, S, exec, grim -g "$(slurp)" -t png - | wl-copy --type image/png

# Close window
bind = $mod, Q, killactive

# Fullscreen
bind = $mod, F, fullscreen

# Float toggle
bind = $mod CTRL, Space, togglefloating

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move window within workspace
bind = $mod CTRL, h, movewindow, l
bind = $mod CTRL, l, movewindow, r
bind = $mod CTRL, k, movewindow, u
bind = $mod CTRL, j, movewindow, d

# Move window to next/prev workspace
bind = $mod CTRL, left,  movetoworkspace, e-1
bind = $mod CTRL, right, movetoworkspace, e+1

# =============================================================================
# WORKSPACES
# =============================================================================

# Persistent workspaces
workspace = 1, defaultName:CODE,  persistent:true
workspace = 2, defaultName:TEST,  persistent:true
workspace = 3, defaultName:FLOW,  persistent:true
workspace = 4, defaultName:EXTRA, persistent:true
workspace = special:term, on-created-empty:alacritty, gapsout:60
workspace = special:firefox, on-created-empty:firefox, gapsout:60
workspace = special:discord, on-created-empty:discord, gapsout:60
workspace = special:notes, on-created-empty:obsidian, gapsout:40 300
workspace = special:music, on-created-empty:chromium --app=https://music.youtube.com, gapsout:60
workspace = special:cmus, on-created-empty:alacritty --class=local-music -e cmus, gapsout:60




# Cycle workspaces
bind = $mod, left,  workspace, e-1
bind = $mod, right, workspace, e+1

# Switch by number
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5


# Switch by shortcut (code=1, test=2, flow=3, extra=4)
bind = $mod CTRL, c, workspace, 1
bind = $mod CTRL, q, workspace, 2
bind = $mod CTRL, f, workspace, 3
bind = $mod CTRL, a, workspace, 4

# Terminal Scratchpad
bind = $mod CTRL, Return, togglespecialworkspace, term

# Screen Recording
bind = $mod CTRL, v, exec, ~/.config/waybar/scripts/record-toggle.sh

# Move window to workspace
bind = $mod CTRL, 1, movetoworkspace, 1
bind = $mod CTRL, 2, movetoworkspace, 2
bind = $mod CTRL, 3, movetoworkspace, 3
bind = $mod CTRL, 4, movetoworkspace, 4
bind = $mod CTRL, 5, movetoworkspace, 5
