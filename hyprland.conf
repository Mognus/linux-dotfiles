# =============================================================================
# HYPRLAND CONFIG — minimal
# =============================================================================

# --- Monitor ---
monitor=,preferred,auto,1

# --- Autostart ---
exec-once = waybar

# --- Input ---
input {
    kb_layout = us
    kb_options = lv3:ralt_switch,umlaut:on
    # Note: custom umlaut xkb file must be installed via keyboard-config repo
    follow_mouse = 1
    sensitivity = 0
}

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgb(89dceb)
    col.inactive_border = rgb(313244)
    layout = dwindle
}

# --- Appearance ---
decoration {
    rounding = 4
}

animations {
    enabled = false
}

# --- Layout ---
dwindle {
    pseudotile = false
    preserve_split = true
}

# =============================================================================
# KEYBINDS
# =============================================================================

$mod = SUPER

# Terminal
bind = $mod, Return, exec, alacritty

# Launcher (rofi)
bind = $mod, Space, exec, rofi -show drun

# Close window
bind = $mod, Q, killactive

# Fullscreen
bind = $mod, F, fullscreen

# Float toggle
bind = $mod SHIFT, Space, togglefloating

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# =============================================================================
# WORKSPACES
# =============================================================================

# Switch
bind = $mod, 1, workspace, name:Work
bind = $mod, 2, workspace, name:Test
bind = $mod, 3, workspace, name:Media
bind = $mod, 4, workspace, name:Teams
bind = $mod, 5, workspace, name:AI
bind = $mod, 6, workspace, name:Term

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, name:Work
bind = $mod SHIFT, 2, movetoworkspace, name:Test
bind = $mod SHIFT, 3, movetoworkspace, name:Media
bind = $mod SHIFT, 4, movetoworkspace, name:Teams
bind = $mod SHIFT, 5, movetoworkspace, name:AI
bind = $mod SHIFT, 6, movetoworkspace, name:Term
